<!DOCTYPE html>
<html>

<head>
  <title>Y2Klick</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="game">
    <button id="clickBtn">Date: <span id="date"></span></button>
    <div id="textbox">
      <p id="message"></p>
    </div>
    <button id="resetBtn">Reset</button>
  </div>
  <button id="buyPetBtn">Buy Tamagotchi</button>
  <div id="petUI" style="display:none;">
    <p>Hunger: <span id="hunger"></span></p>
    <button id="feedBtn">Feed</button>
  </div>

  <script src="clicker.js" defer></script>
</body>

</html>
